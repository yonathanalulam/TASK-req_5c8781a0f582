services:
  mongo-test:
    image: mongo:7
    command: ["mongod", "--bind_ip_all", "--quiet", "--logpath", "/dev/null"]
    tmpfs:
      - /data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 5s
      timeout: 5s
      retries: 30

  backend-test:
    build:
      context: ./backend
      dockerfile: Dockerfile
    working_dir: /app
    depends_on:
      mongo-test:
        condition: service_healthy
    environment:
      NODE_ENV: test
      CI: "true"
      MONGO_URI: mongodb://mongo-test:27017/offline_ops_portal_test
      JWT_SECRET: docker-test-jwt-secret-aB12345678901234567890abcdefghij
      ENCRYPTION_KEY_V1_HEX: 112233445566778899aabbccddeeff00112233445566778899aabbccddeeff00
    command: ["npm", "test"]

  frontend-test:
    build:
      context: ./frontend
      dockerfile: Dockerfile.test
    working_dir: /app
    environment:
      CI: "true"
    command: ["npm", "test"]

  e2e-app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      mongo-test:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "4000"
      MONGO_URI: mongodb://mongo-test:27017/offline_ops_portal_e2e
      CORS_ORIGIN: "*"
      JWT_SECRET: docker-e2e-jwt-secret-aB12345678901234567890abcdefghij
      ENCRYPTION_KEY_V1_HEX: 112233445566778899aabbccddeeff00112233445566778899aabbccddeeff00
      SEED_ADMIN_USERNAME: admin
      SEED_ADMIN_PASSWORD: "ChangeMeNow!2026"
    command: >
      sh -c "node src/seed.js && node src/server.js"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/api/v1/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 30

  e2e-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      e2e-app:
        condition: service_healthy
    environment:
      BACKEND_HOST: e2e-app
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost/"]
      interval: 5s
      timeout: 5s
      retries: 30

  e2e-tests:
    build:
      context: ./e2e
      dockerfile: Dockerfile.test
    working_dir: /app
    depends_on:
      e2e-app:
        condition: service_healthy
      e2e-frontend:
        condition: service_healthy
    environment:
      CI: "true"
      BACKEND_URL: http://e2e-app:4000
      FRONTEND_URL: http://e2e-frontend
    command: ["npm", "test"]
